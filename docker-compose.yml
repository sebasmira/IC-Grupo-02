version: '3.8'

services:
  # ========================================
  # BASE DE DATOS - PostgreSQL
  # ========================================
  db:
    image: postgres:16-alpine
    container_name: usuarios_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: usuarios_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d usuarios_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # BACKEND - FastAPI
  # ========================================
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: usuarios_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/usuarios_db
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # FRONTEND - Nginx
  # ========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: usuarios_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

# ========================================
# VOLÚMENES
# ========================================
volumes:
  postgres_data:
    driver: local

# ========================================
# REDES
# ========================================
networks:
  app-network:
    driver: bridge