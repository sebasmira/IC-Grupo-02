<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro de Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar {
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .stats-card {
            text-align: center;
            padding: 20px;
            color: white;
            border-radius: 15px;
        }

        .bg-users {
            background: #0d6efd;
        }

        .bg-active {
            background: #198754;
        }

        .bg-admin {
            background: #dc3545;
        }

        .btn {
            border-radius: 10px;
        }

        input,
        select {
            border-radius: 10px !important;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                Sistema API REST
            </a>
        </div>
    </nav>

    <div class="container">

        <!-- DASHBOARD -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="stats-card bg-users">
                    <h2 id="totalUsuarios">0</h2>
                    <p>Total Usuarios</p>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="stats-card bg-active">
                    <h2 id="usuariosActivos">0</h2>
                    <p>Usuarios Activos</p>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="stats-card bg-admin">
                    <h2 id="admins">0</h2>
                    <p>Administradores</p>
                </div>
            </div>
        </div>

        <!-- FORMULARIO -->
        <div class="card p-4 mb-4">
            <h3 class="mb-4 text-center">Registro de Usuarios</h3>

            <form id="usuarioForm">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" class="form-control" id="apellido" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Correo</label>
                        <input type="email" class="form-control" id="correo" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" class="form-control" id="telefono" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Edad</label>
                        <input type="number" class="form-control" id="edad" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ciudad</label>
                        <input type="text" class="form-control" id="ciudad" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Rol</label>
                        <select class="form-select" id="rol">
                            <option value="Usuario">Usuario</option>
                            <option value="Administrador">Administrador</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Estado</label>
                        <select class="form-select" id="estado">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha Registro</label>
                        <input type="date" class="form-control" id="fechaRegistro" required>
                    </div>

                </div>

                <div class="d-grid mt-3">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Guardar Usuario
                    </button>
                </div>

            </form>
        </div>

        <!-- BUSCADOR -->
        <div class="card p-4 mb-4">
            <div class="row align-items-center">

                <div class="col-md-6">
                    <h4>Lista de Usuarios</h4>
                </div>

                <div class="col-md-6">
                    <input type="text" id="buscar" class="form-control" placeholder="Buscar usuario...">
                </div>

            </div>
        </div>

        <!-- TABLA -->
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Edad</th>
                        <th>Ciudad</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaUsuarios">
                </tbody>

            </table>
        </div>

    </div>

    <script>

        const API_URL = 'http://localhost:8080/usuarios';

        const form = document.getElementById('usuarioForm');
        const tabla = document.getElementById('tablaUsuarios');
        const buscar = document.getElementById('buscar');

        let usuarios = [];

        // CARGAR USUARIOS
        async function cargarUsuarios() {
            try {
                const response = await fetch(API_URL);
                usuarios = await response.json();

                renderUsuarios(usuarios);
                actualizarDashboard();

            } catch (error) {
                console.error('Error cargando usuarios:', error);
            }
        }

        // RENDER TABLA
        function renderUsuarios(lista) {
            tabla.innerHTML = '';

            lista.forEach(usuario => {

                tabla.innerHTML += `
          <tr>
            <td>${usuario.id || ''}</td>
            <td>${usuario.nombre}</td>
            <td>${usuario.apellido}</td>
            <td>${usuario.correo}</td>
            <td>${usuario.telefono}</td>
            <td>${usuario.edad}</td>
            <td>${usuario.ciudad}</td>
            <td>${usuario.rol}</td>
            <td>${usuario.estado}</td>
            <td>${usuario.fechaRegistro}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="eliminarUsuario(${usuario.id})">
                Eliminar
              </button>
            </td>
          </tr>
        `;
            });
        }

        // DASHBOARD
        function actualizarDashboard() {

            document.getElementById('totalUsuarios').innerText = usuarios.length;

            const activos = usuarios.filter(u => u.estado === 'Activo').length;
            document.getElementById('usuariosActivos').innerText = activos;

            const admins = usuarios.filter(u => u.rol === 'Administrador').length;
            document.getElementById('admins').innerText = admins;
        }

        // GUARDAR USUARIO
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const usuario = {
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                correo: document.getElementById('correo').value,
                telefono: document.getElementById('telefono').value,
                edad: document.getElementById('edad').value,
                ciudad: document.getElementById('ciudad').value,
                rol: document.getElementById('rol').value,
                estado: document.getElementById('estado').value,
                fechaRegistro: document.getElementById('fechaRegistro').value
            };

            try {

                await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(usuario)
                });

                alert('Usuario guardado correctamente');

                form.reset();
                cargarUsuarios();

            } catch (error) {
                console.error('Error guardando usuario:', error);
            }
        });

        // ELIMINAR
        async function eliminarUsuario(id) {

            if (!confirm('¿Deseas eliminar este usuario?')) {
                return;
            }

            try {

                await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                cargarUsuarios();

            } catch (error) {
                console.error('Error eliminando usuario:', error);
            }
        }

        // BUSCAR
        buscar.addEventListener('keyup', () => {

            const texto = buscar.value.toLowerCase();

            const filtrados = usuarios.filter(usuario =>
                usuario.nombre.toLowerCase().includes(texto) ||
                usuario.apellido.toLowerCase().includes(texto) ||
                usuario.correo.toLowerCase().includes(texto)
            );

            renderUsuarios(filtrados);
        });

        // INICIAR
        cargarUsuarios();

        // cambio pequeño para actions.

    </script>

</body>

</html>
